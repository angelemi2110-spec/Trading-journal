<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Trading Journal"/>
<title>Trading Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080C10;--card:#0E1318;--border:#1C2530;--gold:#F5A623;--orange:#E8703A;
  --blue:#3B82F6;--green:#22C55E;--red:#EF4444;--purple:#A855F7;
  --text:#E2E8F0;--muted:#64748B;--darkgray:#1A1A1A;
}
html,body{background:var(--bg);min-height:100vh;font-family:'Syne',sans-serif;color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--card);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px;}

/* Layout */
#app{max-width:780px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
#nav{padding:14px 18px 0;border-bottom:1px solid var(–border);background:var(–bg);position:sticky;top:0;z-index:100;}
.nav-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.nav-brand{font-size:11px;color:var(–gold);font-family:‘Space Mono’,monospace;text-transform:uppercase;letter-spacing:.15em;}
.nav-brand span{display:block;font-size:9px;color:var(–muted);}
.nav-stats{font-family:‘Space Mono’,monospace;font-size:11px;color:var(–muted);}
.nav-stats b{font-weight:700;}
.nav-tabs{display:flex;gap:6px;padding-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:9px 14px;border-radius:10px;font-size:12px;font-weight:700;font-family:‘Syne’,sans-serif;
border:1px solid var(–border);cursor:pointer;white-space:nowrap;transition:all .15s;background:transparent;color:var(–muted);}
.tab-btn.active{background:var(–gold);color:#000;border-color:var(–gold);}
#content{flex:1;padding:18px 18px 40px;}

/* Cards */
.card{background:var(–card);border:1px solid var(–border);border-radius:14px;padding:18px;}
.card+.card{margin-top:12px;}

/* Forms */
label{font-size:11px;color:var(–muted);text-transform:uppercase;letter-spacing:.08em;
display:block;margin-bottom:5px;font-family:‘Space Mono’,monospace;}
input,textarea,select{background:var(–card);border:1px solid var(–border);color:var(–text);
font-family:‘Syne’,sans-serif;border-radius:8px;padding:10px 12px;width:100%;
font-size:13px;outline:none;transition:border .2s;-webkit-appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(–gold);}
select option{background:#0E1318;}
textarea{resize:vertical;min-height:70px;}
.field{margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.span2{grid-column:span 2;}

/* Buttons */
button{cursor:pointer;font-family:‘Syne’,sans-serif;border:none;border-radius:8px;transition:all .15s;font-weight:700;}
.btn-gold{background:var(–gold);color:#000;padding:12px 20px;font-size:13px;width:100%;border-radius:10px;}
.btn-ghost{background:transparent;color:var(–muted);padding:9px 16px;font-size:13px;border:1px solid var(–border);border-radius:8px;}
.btn-danger{background:transparent;color:var(–red);padding:12px 18px;font-size:13px;border:1px solid var(–red);border-radius:10px;}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn-row .btn-gold{flex:1;}

/* Toggle groups */
.tg{display:flex;flex-wrap:wrap;gap:6px;}
.tg-btn{padding:7px 13px;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;
background:var(–card);color:var(–muted);border:1px solid var(–border);transition:all .15s;font-family:‘Syne’,sans-serif;}
.tg-btn.sel{background:var(–gold);color:#000;border-color:var(–gold);}
.tg-btn.sel-green{background:var(–green);color:#fff;border-color:var(–green);}
.tg-btn.sel-red{background:var(–red);color:#fff;border-color:var(–red);}
.tg-btn.sel-blue{background:var(–blue);color:#fff;border-color:var(–blue);}
.tg-btn.sel-muted{background:#334155;color:#fff;border-color:#334155;}

/* Section headers */
.sec-title{font-size:20px;font-weight:800;color:var(–gold);margin-bottom:6px;}
.sec-sub{font-size:12px;color:var(–muted);font-family:‘Space Mono’,monospace;margin-bottom:18px;}
.subsec{font-size:13px;font-weight:700;color:var(–orange);margin:14px 0 8px;}
.hr{border:none;border-top:1px solid var(–border);margin:12px 0;}

/* Trade list item */
.trade-item{background:var(–card);border:1px solid var(–border);border-radius:12px;
padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border .15s;}
.trade-item:hover,.trade-item:active{border-color:var(–gold);}
.trade-item-top{display:flex;justify-content:space-between;align-items:flex-start;}
.trade-pair{font-weight:800;font-size:15px;}
.trade-dir{font-size:12px;font-weight:400;margin-left:6px;}
.trade-meta{font-size:11px;color:var(–muted);font-family:‘Space Mono’,monospace;margin-top:3px;}
.trade-pnl{font-weight:700;font-family:‘Space Mono’,monospace;font-size:13px;text-align:right;}
.trade-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(–border);}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;}

/* Stats */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.stat-card{background:var(–card);border:1px solid var(–border);border-radius:14px;
padding:16px 18px;flex:1;min-width:120px;}
.stat-label{font-size:10px;color:var(–muted);font-family:‘Space Mono’,monospace;
text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:800;line-height:1;}
.stat-sub{font-size:11px;color:var(–muted);margin-top:3px;}

/* Stars */
.stars{display:flex;gap:3px;font-size:20px;}
.star{cursor:pointer;transition:filter .15s;filter:grayscale(1) opacity(.3);}
.star.on{filter:none;}

/* Tabs inside form */
.form-tabs{display:flex;gap:6px;background:var(–card);padding:6px;border-radius:12px;
border:1px solid var(–border);margin-bottom:18px;}
.form-tab{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;
background:transparent;color:var(–muted);border:none;cursor:pointer;font-family:‘Syne’,sans-serif;transition:all .15s;}
.form-tab.active{background:var(–gold);color:#000;}

/* Back button */
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}

/* Bar chart */
.bar-wrap{margin-bottom:8px;}
.bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.bar-track{background:#1a1a1a;border-radius:4px;height:7px;}
.bar-fill{border-radius:4px;height:100%;transition:width .4s;}

/* Mantra box */
.mantra-box{background:linear-gradient(135deg,#1a0a00,#0e1318);
border:1px solid rgba(245,166,35,.2);border-radius:14px;padding:18px 22px;text-align:center;margin-top:14px;}
.mantra-label{font-size:10px;color:var(–muted);font-family:‘Space Mono’,monospace;
text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.mantra-text{color:var(–gold);font-style:italic;font-weight:700;font-size:13px;line-height:1.7;}

/* Toast */
#toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;
font-size:13px;font-weight:700;z-index:999;font-family:‘Space Mono’,monospace;
opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

/* Filters */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;
background:transparent;color:var(–muted);border:1px solid var(–border);cursor:pointer;font-family:‘Syne’,monospace;}
.filter-btn.active{background:var(–gold);color:#000;border-color:var(–gold);}

/* Summary box inside form */
.summary-box{background:var(–card);border:1px solid var(–border);border-radius:12px;padding:16px;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;}
.summary-grid span{color:var(–muted);}
.summary-grid b{font-weight:700;}

/* Empty state */
.empty{text-align:center;color:var(–muted);padding:50px 0;font-family:‘Space Mono’,monospace;font-size:13px;}

/* Diary item */
.diary-item{background:var(–card);border:1px solid var(–border);border-radius:12px;
padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border .15s;}
.diary-item:hover{border-color:var(–gold);}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .25s ease;}

@media(max-width:500px){
.grid2{grid-template-columns:1fr;}
.span2{grid-column:span 1;}
.stats-row{gap:8px;}
.stat-card{min-width:100px;padding:12px 14px;}
.stat-value{font-size:22px;}
}
</style>

</head>
<body>
<div id="app">
  <div id="nav">
    <div class="nav-top">
      <div class="nav-brand">Trading Journal<span>London · New York Sessions</span></div>
      <div class="nav-stats" id="nav-stats">WR <b id="ns-wr">0%</b> · PnL <b id="ns-pnl">0</b></div>
    </div>
    <div class="nav-tabs">
      <button class="tab-btn active" onclick="go('dashboard')">🏠 Dashboard</button>
      <button class="tab-btn" onclick="go('new-trade')">📊 Nuevo Trade</button>
      <button class="tab-btn" onclick="go('log')">📋 Historial</button>
      <button class="tab-btn" onclick="go('diary')">📓 Diario</button>
      <button class="tab-btn" onclick="go('stats')">📈 Stats</button>
    </div>
  </div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
// ── Storage ───────────────────────────────────────────────────────────────────
const DB = {
  trades: () => JSON.parse(localStorage.getItem('tj_trades')||'[]'),
  saveTrades: d => localStorage.setItem('tj_trades', JSON.stringify(d)),
  dailies: () => JSON.parse(localStorage.getItem('tj_dailies')||'[]'),
  saveDailies: d => localStorage.setItem('tj_dailies', JSON.stringify(d)),
};

// ── State ─────────────────────────────────────────────────────────────────────
let view = 'dashboard';
let editingTrade = null;
let editingDaily = null;
let formTab = 'trade';
let filterResult = 'all';
let tf = newTF();
let df = newDF();

function newTF(){return{id:null,date:today(),session:'',pair:'',direction:'Long',
  entry:'',sl:'',tp:'',rr:'',result:'',pnl:'',emotion_before:'',emotion_during:'',
  emotion_after:'',followed_plan:null,mistake:'',screenshot_note:'',lesson:'',notes:'',rating:3};}
function newDF(){return{id:null,date:today(),mood:3,sleep_hours:'',market_bias:'',
  focus_level:3,intentions:'',reflection:'',gratitude:''};}

function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'2-digit',month:'short'});}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err'?'#EF4444':type==='warn'?'#92400e':'#22C55E';
  t.style.color = '#fff';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function go(v, opts={}){
  view = v;
  if(v==='new-trade'){
    if(!opts.edit){tf=newTF();editingTrade=null;}
    formTab='trade';
  }
  if(v==='new-daily'){
    if(!opts.edit){df=newDF();editingDaily=null;}
  }
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.includes(
      v==='dashboard'?'Dashboard':v==='new-trade'?'Nuevo':v==='log'?'Historial':v==='diary'?'Diario':'Stats'
    ));
  });
  updateNavStats();
  render();
}

function updateNavStats(){
  const trades = DB.trades();
  const wins = trades.filter(t=>t.result==='✅ Ganada').length;
  const wr = trades.length ? Math.round(wins/trades.length*100) : 0;
  const pnl = trades.reduce((a,t)=>a+(parseFloat(t.pnl)||0),0);
  document.getElementById('ns-wr').textContent = wr+'%';
  document.getElementById('ns-wr').style.color = wr>=50?'#22C55E':'#EF4444';
  document.getElementById('ns-pnl').textContent = (pnl>=0?'+':'')+pnl.toFixed(1);
  document.getElementById('ns-pnl').style.color = pnl>=0?'#22C55E':'#EF4444';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const SESSIONS = ['London (12am-3am)','New York (6am-9am)'];
const PAIRS = ['EURUSD','GBPUSD','XAUUSD','USDJPY','GBPJPY','NAS100','US30','Otro'];
const EMOTIONS = ['😤 Ansioso','😌 Calmado','💪 Enfocado','😴 Cansado','😰 Con miedo','🎯 En zona','😤 Frustrado','🔥 Impulsivo'];
const RESULTS = ['✅ Ganada','❌ Perdida','➖ Break Even'];
const MISTAKES = ['Moví el SL','Entré sin setup','Sobreoperé','Opté por venganza','Ignoré el plan','No esperé el setup','Ninguno'];

function tg(options, current, field, colorMap={}){
  return options.map(o=>{
    let cls = 'tg-btn';
    if(current===o){
      cls += colorMap[o] ? ' sel-'+colorMap[o] : ' sel';
    }
    const safe = o.replace(/'/g,"\\'");
    return `<button class="${cls}" onclick="setTF('${field}','${safe}');render()">${o}</button>`;
  }).join('');
}

function dgTg(options, current, field){
  return options.map(o=>{
    const cls = 'tg-btn'+(current===o?' sel':'');
    const safe = o.replace(/'/g,"\\'");
    return `<button class="${cls}" onclick="setDF('${field}','${safe}');render()">${o}</button>`;
  }).join('');
}

function stars(val, editable=true){
  return [1,2,3,4,5].map(i=>{
    const on = i<=val?'on':'';
    const click = editable?`onclick="setTF('rating',${i});render()"`:''
    return `<span class="star ${on}" ${click}>⭐</span>`;
  }).join('');
}

function slider(val, field, min, max, labels, src='tf'){
  const fn = src==='tf'?`setTF('${field}',parseInt(this.value));renderPartial('${field}')`
                       :`setDF('${field}',parseInt(this.value));renderPartial('${field}')`;
  const lblHtml = labels ? `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px">${labels.map(l=>`<span>${l}</span>`).join('')}</div>` : '';
  return `<input type="range" min="${min}" max="${max}" value="${val}"
    oninput="${fn}" style="width:100%;accent-color:var(--gold);background:transparent;border:none;padding:0;">${lblHtml}`;
}

function setTF(k,v){tf[k]=v;}
function setDF(k,v){df[k]=v;}
function renderPartial(field){/* full render for simplicity */render();}

function yesno(val){
  const y = val===true;
  const n = val===false;
  return `
    <div style="display:flex;gap:10px;">
      <button class="tg-btn${y?' sel-green':''}" style="flex:1;padding:12px;"
        onclick="setTF('followed_plan',true);render()">✅ Sí, seguí el plan</button>
      <button class="tg-btn${n?' sel-red':''}" style="flex:1;padding:12px;"
        onclick="setTF('followed_plan',false);render()">❌ No, me desvié</button>
    </div>`;
}

// ── Trade CRUD ─────────────────────────────────────────────────────────────────
function saveTrade(){
  if(!tf.pair||!tf.result){toast('Completa par y resultado','err');return;}
  const trades = DB.trades();
  if(editingTrade!==null){
    const idx = trades.findIndex(t=>t.id===editingTrade);
    trades[idx]={...tf,id:editingTrade};
    toast('Trade actualizado ✓');
  } else {
    trades.unshift({...tf,id:Date.now()});
    toast('Trade registrado ✓');
  }
  DB.saveTrades(trades);
  tf=newTF();editingTrade=null;
  go('log');
}

function deleteTrade(id){
  if(!confirm('¿Eliminar este trade?'))return;
  DB.saveTrades(DB.trades().filter(t=>t.id!==id));
  toast('Trade eliminado','warn');
  tf=newTF();editingTrade=null;
  go('log');
}

function editTrade(id){
  const t = DB.trades().find(t=>t.id===id);
  tf={...t};editingTrade=id;
  go('new-trade',{edit:true});
}

// ── Daily CRUD ─────────────────────────────────────────────────────────────────
function saveDaily(){
  const dailies = DB.dailies();
  if(editingDaily!==null){
    const idx = dailies.findIndex(d=>d.id===editingDaily);
    dailies[idx]={...df,id:editingDaily};
    toast('Entrada actualizada ✓');
  } else {
    dailies.unshift({...df,id:Date.now()});
    toast('Entrada guardada ✓');
  }
  DB.saveDailies(dailies);
  df=newDF();editingDaily=null;
  go('diary');
}

function editDaily(id){
  const d = DB.dailies().find(d=>d.id===id);
  df={...d};editingDaily=id;
  go('new-daily',{edit:true});
}

function deleteDaily(id){
  if(!confirm('¿Eliminar esta entrada?'))return;
  DB.saveDailies(DB.dailies().filter(d=>d.id!==id));
  toast('Entrada eliminada','warn');
  df=newDF();editingDaily=null;
  go('diary');
}

// ── Export ─────────────────────────────────────────────────────────────────────
function exportData(){
  const data = {trades:DB.trades(),dailies:DB.dailies(),exported:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'trading-journal-backup.json';
  a.click();
  toast('Backup descargado ✓');
}

function importData(e){
  const file = e.target.files[0];
  if(!file)return;
  const r = new FileReader();
  r.onload = ev=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(data.trades)DB.saveTrades(data.trades);
      if(data.dailies)DB.saveDailies(data.dailies);
      toast('Datos importados ✓');
      go('dashboard');
    }catch{toast('Archivo inválido','err');}
  };
  r.readAsText(file);
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  const el = document.getElementById('content');
  el.innerHTML = views[view]();
  el.className = 'fade';
  void el.offsetWidth;
  // Bind live inputs
  el.querySelectorAll('input[data-bind],textarea[data-bind],select[data-bind]').forEach(inp=>{
    const [src,key] = inp.dataset.bind.split(':');
    inp.addEventListener('input',()=>{
      if(src==='tf') tf[key]=inp.type==='checkbox'?inp.checked:inp.value;
      else df[key]=inp.value;
    });
  });
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
const views = {

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
dashboard(){
  const trades = DB.trades();
  const wins = trades.filter(t=>t.result==='✅ Ganada').length;
  const losses = trades.filter(t=>t.result==='❌ Perdida').length;
  const bes = trades.filter(t=>t.result==='➖ Break Even').length;
  const total = trades.length;
  const wr = total?Math.round(wins/total*100):0;
  const pnl = trades.reduce((a,t)=>a+(parseFloat(t.pnl)||0),0);
  const rrs = trades.filter(t=>t.rr);
  const avgRR = rrs.length?(rrs.reduce((a,t)=>a+(parseFloat(t.rr)||0),0)/rrs.length).toFixed(2):'—';
  const fp = total?Math.round(trades.filter(t=>t.followed_plan===true).length/total*100):0;

  const recentTrades = trades.slice(0,5).map(t=>`
    <div class="trade-item" onclick="editTrade(${t.id})">
      <div class="trade-item-top">
        <div>
          <div class="trade-pair">${t.pair}<span class="trade-dir" style="color:${t.direction==='Long'?'var(--green)':'var(--red)'}">▲ ${t.direction}</span></div>
          <div class="trade-meta">${fmtDate(t.date)} · ${t.session||'—'}</div>
        </div>
        <div>
          <div style="font-size:18px;text-align:right">${t.result?t.result.split(' ')[0]:''}</div>
          <div class="trade-pnl" style="color:${parseFloat(t.pnl)>=0?'var(--green)':'var(--red)'}">
            ${t.pnl?(parseFloat(t.pnl)>=0?'+':'')+t.pnl:'—'}
          </div>
        </div>
      </div>
    </div>`).join('');

  return `
    <div class="sec-title">Dashboard</div>
    <div class="sec-sub">${new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'})}</div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Trades</div>
        <div class="stat-value">${total}</div>
        <div class="stat-sub">registrados</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Winrate</div>
        <div class="stat-value" style="color:${wr>=50?'var(--green)':'var(--red)'}">${wr}%</div>
        <div class="stat-sub">${wins}W · ${losses}L · ${bes}BE</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PnL</div>
        <div class="stat-value" style="color:${pnl>=0?'var(--green)':'var(--red)'}">${pnl>=0?'+':''}${pnl.toFixed(1)}</div>
        <div class="stat-sub">pips / unidades</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">R:R prom</div>
        <div class="stat-value" style="color:var(--blue)">${avgRR}</div>
        <div class="stat-sub">riesgo/recompensa</div>
      </div>
      <div class="stat-card">

// ── TRADE LOG ─────────────────────────────────────────────────────────────────
log(){
const trades = DB.trades();
const filtered = filterResult===‘all’?trades:trades.filter(t=>t.result===filterResult);

const items = filtered.map(t=>` <div class="trade-item" onclick="editTrade(${t.id})"> <div class="trade-item-top"> <div> <div class="trade-pair">${t.pair||'—'} <span class="trade-dir" style="color:${t.direction==='Long'?'var(--green)':'var(--red)'}">▲ ${t.direction}</span> </div> <div class="trade-meta">${fmtDate(t.date)} · ${t.session||'—'}</div> </div> <div style="text-align:right"> <div style="font-size:18px">${t.result?t.result.split(' ')[0]:''}</div> <div class="trade-pnl" style="color:${parseFloat(t.pnl)>=0?'var(--green)':'var(--red)'}"> ${t.pnl?(parseFloat(t.pnl)>=0?'+':'')+t.pnl:'—'} </div> <div style="font-size:11px;color:var(--muted)">R:R ${t.rr||'—'}</div> </div> </div> <div class="trade-tags"> ${t.emotion_before?`<span class="tag" style="background:#1a1a2e;color:var(--purple)">${t.emotion_before}</span>`:''} ${t.followed_plan===false?`<span class="tag" style="background:#2a0a0a;color:var(--red)">⚠️ Desvío del plan</span>`:''} ${t.mistake&&t.mistake!=='Ninguno'?`<span class="tag" style="background:#2a1a00;color:var(--gold)">${t.mistake}</span>`:''} ${t.rating?`<span style="font-size:13px">${‘⭐’.repeat(t.rating)}</span>`:''} </div> ${t.lesson?`<div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;">💡 ${t.lesson.slice(0,100)}${t.lesson.length>100?’…’:’’}</div>`:''} </div>`).join(’’);

return ` <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"> <div class="sec-title" style="margin-bottom:0">Historial</div> <button class="tab-btn" style="font-size:12px;padding:7px 14px;" onclick="go('new-trade')">+ Nuevo</button> </div> <div class="filter-row"> ${['all','✅ Ganada','❌ Perdida','➖ Break Even'].map((v,i)=>`
<button class="filter-btn ${filterResult===v?'active':''}"
onclick="filterResult='${v}';render()">
${[‘Todos’,‘Ganadas’,‘Perdidas’,‘BE’][i]}

},

// ── STATS ─────────────────────────────────────────────────────────────────────
stats(){
const trades = DB.trades();
const total = trades.length;
if(total===0) return `<div class="sec-title">Estadísticas</div><div class="empty">Registra trades para ver estadísticas.</div>`;

const byPair = PAIRS.map(p=>({
pair:p,
count:trades.filter(t=>t.pair===p).length,
wins:trades.filter(t=>t.pair===p&&t.result===‘✅ Ganada’).length
})).filter(p=>p.count>0);

const bySess = SESSIONS.map(s=>({
session:s.split(’ ’)[0],
count:trades.filter(t=>t.session===s).length,
wins:trades.filter(t=>t.session===s&&t.result===‘✅ Ganada’).length
}));

const errors = MISTAKES.filter(m=>m!==‘Ninguno’).map(m=>({
mistake:m,count:trades.filter(t=>t.mistake===m).length
})).filter(m=>m.count>0).sort((a,b)=>b.count-a.count);

const pairBars = byPair.map(p=>{
const pct = p.count?Math.round(p.wins/p.count*100):0;
return `<div class="bar-wrap"> <div class="bar-label"><span style="font-weight:700">${p.pair}</span><span style="color:var(--muted)">${p.wins}/${p.count} (${pct}%)</span></div> <div class="bar-track"><div class="bar-fill" style="background:var(--gold);width:${pct}%"></div></div> </div>`;
}).join(’’);

const sessBars = bySess.map(s=>{
const pct = s.count?Math.round(s.wins/s.count*100):0;
return `<div class="bar-wrap"> <div class="bar-label"><span style="font-weight:700">${s.session}</span><span style="color:var(--muted)">${s.wins}/${s.count}</span></div> <div class="bar-track"><div class="bar-fill" style="background:var(--blue);width:${pct}%"></div></div> </div>`;
}).join(’’);

const errorList = errors.length
? errors.map(e=>`<div style="display:flex;justify-content:space-between;padding:9px 12px;background:#0a0a0a;border-radius:8px;margin-bottom:6px;font-size:13px;"> <span>${e.mistake}</span><span style="color:var(--red);font-weight:700;font-family:'Space Mono',monospace">${e.count}x</span> </div>`).join(’’)
: ‘<div style="color:var(--muted);font-size:12px">Sin errores registrados 🎯</div>’;

// Emotions frequency
const emoCount = EMOTIONS.map(e=>({e,c:trades.filter(t=>t.emotion_before===e).length}))
.filter(x=>x.c>0).sort((a,b)=>b.c-a.c);
const emoList = emoCount.map(x=>` <div style="display:flex;justify-content:space-between;padding:7px 12px;background:#0a0a0a;border-radius:8px;margin-bottom:5px;font-size:12px;"> <span>${x.e}</span><span style="color:var(--purple);font-weight:700;font-family:'Space Mono',monospace">${x.c}x</span> </div>`).join(’’);

return `
<div class="sec-title">Estadísticas</div>
<div class="sec-sub">${total} trades registrados</div>

```
<div class="card">
  <div class="subsec" style="margin-top:0">📊 Por par</div>
  ${pairBars||'<div style="color:var(--muted);font-size:12px">Sin datos</div>'}
</div>
<div class="card">
  <div class="subsec" style="margin-top:0">🕐 Por sesión</div>
  ${sessBars}
</div>
<div class="card">
  <div class="subsec" style="margin-top:0">⚠️ Errores frecuentes</div>
  ${errorList}
</div>
<div class="card">
  <div class="subsec" style="margin-top:0">🧠 Emoción al entrar</div>
  ${emoList||'<div style="color:var(--muted);font-size:12px">Sin datos</div>'}
</div>`;
```

}

};// end views

render();
updateNavStats();
</script>
